name: Prepare AI fear article v2.1 publication

on:
  push:
    branches:
      - feature/ai-fear-final-editorial-pass
    paths:
      - .github/workflows/publish-ai-fear-v2-1.yml

permissions:
  contents: write

jobs:
  publish-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add DOI and version metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          doi = "10.5281/zenodo.21340181"
          doi_url = f"https://doi.org/{doi}"
          license_name = "Creative Commons Attribution 4.0 International"
          license_url = "https://creativecommons.org/licenses/by/4.0/"

          files = {
              Path("src/content/articles/are-we-afraid-of-ai-or-of-ourselves.md"): (
                  'socialImageType: "image/webp"\n',
                  'socialImageType: "image/webp"\n'
                  f'doi: "{doi}"\n'
                  f'doiUrl: "{doi_url}"\n'
                  'version: "2.1"\n'
                  f'licenseName: "{license_name}"\n'
                  f'licenseUrl: "{license_url}"\n'
              ),
              Path("src/content/articles/czy-boimy-sie-ai-czy-boimy-sie-samych-siebie.md"): (
                  'socialImageType: "image/webp"\n',
                  'socialImageType: "image/webp"\n'
                  f'relatedDoi: "{doi}"\n'
                  f'relatedDoiUrl: "{doi_url}"\n'
                  'relatedVersion: "2.1"\n'
                  'relatedDoiLabel: "DOI angielskiej wersji do cytowania"\n'
                  f'licenseName: "{license_name}"\n'
                  f'licenseUrl: "{license_url}"\n'
              ),
          }

          for path, (marker, replacement) in files.items():
              text = path.read_text(encoding="utf-8")
              if doi in text:
                  print(f"Metadata already present in {path}")
                  continue
              if marker not in text:
                  raise RuntimeError(f"Frontmatter marker missing in {path}")
              path.write_text(text.replace(marker, replacement, 1), encoding="utf-8", newline="\n")
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Layout tests
        run: npm run test:layout

      - name: Verify publication metadata
        run: |
          grep -F 'doi: "10.5281/zenodo.21340181"' src/content/articles/are-we-afraid-of-ai-or-of-ourselves.md
          grep -F 'version: "2.1"' src/content/articles/are-we-afraid-of-ai-or-of-ourselves.md
          grep -F 'relatedDoi: "10.5281/zenodo.21340181"' src/content/articles/czy-boimy-sie-ai-czy-boimy-sie-samych-siebie.md
          grep -F 'relatedVersion: "2.1"' src/content/articles/czy-boimy-sie-ai-czy-boimy-sie-samych-siebie.md
          grep -R -F '10.5281/zenodo.21340181' dist/articles/are-we-afraid-of-ai-or-of-ourselves/index.html
          grep -R -F '10.5281/zenodo.21340181' dist/pl/articles/czy-boimy-sie-ai-czy-boimy-sie-samych-siebie/index.html

      - name: Commit metadata to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/content/articles/are-we-afraid-of-ai-or-of-ourselves.md \
            src/content/articles/czy-boimy-sie-ai-czy-boimy-sie-samych-siebie.md
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "Add DOI metadata for AI fear article v2.1 [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
