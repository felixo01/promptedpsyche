<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Context window diagram</title>
  <desc id="desc">A calm editorial diagram showing selected inputs entering a bounded context window, then producing an output.</desc>
  <defs>
    <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#f7f3ea"/>
      <path d="M0 18L18 0" stroke="#e6ded0" stroke-width="0.45" opacity="0.45"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#22201c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#paper)"/>
  <circle cx="1285" cy="170" r="118" fill="#d7e1dc" opacity="0.7"/>
  <circle cx="1235" cy="205" r="95" fill="none" stroke="#8c9893" stroke-width="1" opacity="0.35"/>
  <circle cx="1235" cy="205" r="64" fill="none" stroke="#8c9893" stroke-width="1" opacity="0.3"/>
  <g opacity="0.45">
    <circle cx="170" cy="710" r="3" fill="#22201c"/>
    <circle cx="200" cy="710" r="3" fill="#22201c"/>
    <circle cx="230" cy="710" r="3" fill="#22201c"/>
    <circle cx="170" cy="740" r="3" fill="#22201c"/>
    <circle cx="200" cy="740" r="3" fill="#22201c"/>
    <circle cx="230" cy="740" r="3" fill="#22201c"/>
  </g>

  <g fill="none" stroke="#22201c" stroke-width="2">
    <rect x="515" y="215" width="570" height="365" rx="18"/>
    <rect x="585" y="285" width="430" height="225" rx="10" stroke-dasharray="8 10" opacity="0.72"/>
  </g>
  <text x="800" y="190" text-anchor="middle" fill="#22201c" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" font-weight="700" letter-spacing="5">CONTEXT WINDOW</text>
  <text x="800" y="548" text-anchor="middle" fill="#536965" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="17" font-weight="700" letter-spacing="3">AVAILABLE CONTEXT</text>

  <g stroke="#22201c" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M350 330 C420 330 455 330 505 330"/>
    <path d="M350 455 C420 455 455 455 505 455"/>
    <path d="M350 580 C420 580 455 580 505 580"/>
    <path d="M1088 398 C1160 398 1200 398 1258 398"/>
  </g>
  <g fill="#fbfaf6" stroke="#22201c" stroke-width="1.8">
    <rect x="125" y="285" width="215" height="90" rx="14"/>
    <rect x="125" y="410" width="215" height="90" rx="14"/>
    <rect x="125" y="535" width="215" height="90" rx="14"/>
    <rect x="1265" y="340" width="230" height="116" rx="16"/>
  </g>

  <g fill="#22201c" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
    <text x="232" y="325" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="3">PROMPT</text>
    <text x="232" y="450" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="3">MATERIAL</text>
    <text x="232" y="575" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="3">LIMITS</text>
    <text x="1380" y="385" text-anchor="middle" font-size="21" font-weight="700" letter-spacing="3">OUTPUT</text>
  </g>

  <g stroke="#536965" stroke-width="2" fill="none" opacity="0.85">
    <path d="M632 335 H828"/>
    <path d="M632 375 H950"/>
    <path d="M632 415 H885"/>
    <path d="M632 455 H972"/>
  </g>
  <circle cx="612" cy="335" r="6" fill="#536965"/>
  <circle cx="612" cy="375" r="6" fill="#536965"/>
  <circle cx="612" cy="415" r="6" fill="#536965"/>
  <circle cx="612" cy="455" r="6" fill="#536965"/>

  <g stroke="#22201c" stroke-width="1.4" opacity="0.42" fill="none">
    <path d="M545 645 C670 700 875 690 1035 622"/>
    <path d="M570 675 C725 755 910 742 1068 674"/>
    <path d="M700 240 C780 175 905 178 992 245"/>
  </g>
  <g fill="#536965">
    <circle cx="545" cy="645" r="7"/>
    <circle cx="1035" cy="622" r="7"/>
    <circle cx="700" cy="240" r="7"/>
    <circle cx="992" cy="245" r="7"/>
  </g>
</svg>

