  <text x="800" y="540" text-anchor="middle" fill="#f7f3ea" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="3" opacity="0.78">LANGUAGE + FRAME</text>

