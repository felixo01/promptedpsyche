<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI mirror conversation loop</title>
  <desc id="desc">A calm editorial diagram showing a user question, a model mirror layer, organized output and a return loop to context and verification.</desc>
  <defs>
