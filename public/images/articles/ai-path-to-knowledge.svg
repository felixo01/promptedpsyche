<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI path to knowledge</title>
  <desc id="desc">A calm editorial diagram showing how an AI model can sit between a human question and a fluent answer while sources, methods, data, uncertainty and verification remain underneath.</desc>
  <defs>
    <pattern id="paper" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#f7f3ea"/>
      <path d="M0 22L22 0" stroke="#e6ded0" stroke-width="0.45" opacity="0.42"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#22201c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
  <circle cx="194" cy="202" r="116" fill="#d7e1dc" opacity="0.58"/>
  <circle cx="1400" cy="686" r="132" fill="#d7e1dc" opacity="0.62"/>

