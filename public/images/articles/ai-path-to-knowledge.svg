    <path d="M690 395 H910"/>
    <path d="M722 429 H878"/>
  </g>

  <g fill="#22201c" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="3">
